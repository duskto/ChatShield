services:
  backend:
    build:
      context: ./backend
    container_name: chatshield-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    working_dir: /app
    environment:
      APP_NAME: ChatShield
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: sqlite:////app/data/chatshield.db
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:4b
      OLLAMA_TIMEOUT: 120
      ENABLE_RULE_CHECK: "true"
      ENABLE_API_MODERATION: "true"
      INPUT_BLOCK_THRESHOLD: high
      OUTPUT_BLOCK_THRESHOLD: high
      SAVE_RAW_TEXT: "true"
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: chatshield-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
